<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MikroTik Network Diagram Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <div class="toolbar-group">
            <div class="toolbar-title">MikroTik Diagram</div>
        </div>
        <div class="toolbar-group">
            <button id="tool-select" class="tool-btn active" title="Select & Move (V)" data-tool="select">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                </svg>
                <span>Select</span>
            </button>
            <button id="tool-connect" class="tool-btn" title="Connect Ports (C)" data-tool="connect">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <circle cx="5" cy="12" r="3"/><circle cx="19" cy="12" r="3"/>
                </svg>
                <span>Connect</span>
            </button>
            <button id="tool-delete" class="tool-btn" title="Delete (Del)" data-tool="delete">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                <span>Delete</span>
            </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                </svg>
            </button>
            <button id="btn-redo" class="tool-btn" title="Redo (Ctrl+Y)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/>
                </svg>
            </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-zoom-in" class="tool-btn" title="Zoom In (+)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
            </button>
            <span id="zoom-level" class="zoom-display">100%</span>
            <button id="btn-zoom-out" class="tool-btn" title="Zoom Out (-)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    <line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
            </button>
            <button id="btn-zoom-fit" class="tool-btn" title="Fit to View">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
            </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="toolbar-group">
            <button id="btn-save" class="tool-btn" title="Save (Ctrl+S)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
                </svg>
                <span>Save</span>
            </button>
            <button id="btn-load" class="tool-btn" title="Load">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <span>Load</span>
            </button>
            <button id="btn-export" class="tool-btn" title="Export as PDF">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span>Export PDF</span>
            </button>
            <button id="btn-logo" class="tool-btn" title="Set Company Logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="M21 15l-5-5L5 21"/>
                </svg>
                <span id="logo-btn-text">Logo</span>
            </button>
            <button id="btn-clear" class="tool-btn" title="Clear Canvas">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/>
                </svg>
                <span>Clear</span>
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div id="main-content">
        <!-- Left Sidebar: Device Catalog -->
        <div id="sidebar">
            <div class="sidebar-header">
                <input type="text" id="device-search" placeholder="Search devices...">
            </div>
            <div id="device-list"></div>
        </div>

        <!-- Center: SVG Canvas -->
        <div id="canvas-container">
            <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="grid-small" width="20" height="20" patternUnits="userSpaceOnUse">
                        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="var(--grid-color-small)" stroke-width="0.5"/>
                    </pattern>
                    <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
                        <rect width="100" height="100" fill="url(#grid-small)"/>
                        <path d="M 100 0 L 0 0 0 100" fill="none" stroke="var(--grid-color-large)" stroke-width="1"/>
                    </pattern>
                    <filter id="port-glow">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                    <filter id="selection-glow">
                        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#0099CC" flood-opacity="0.8"/>
                    </filter>
                </defs>
                <rect id="grid-bg" width="10000" height="10000" x="-5000" y="-5000" fill="url(#grid-large)"/>
                <g id="devices-layer"></g>
                <g id="connections-layer"></g>
                <g id="temp-line-layer"></g>
                <g id="selection-layer"></g>
            </svg>
        </div>

        <!-- Right Panel: Connection Table -->
        <div id="connection-panel">
            <div class="panel-header">
                <span class="panel-title">Connections</span>
                <span id="connection-count" class="panel-badge">0</span>
                <button id="toggle-panel" class="panel-toggle" title="Toggle Panel">&times;</button>
            </div>
            <div class="panel-search">
                <input type="text" id="connection-filter" placeholder="Filter connections...">
            </div>
            <div id="connection-table-body"></div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
        <span id="status-zoom">Zoom: 100%</span>
        <span class="status-sep">|</span>
        <span id="status-devices">Devices: 0</span>
        <span class="status-sep">|</span>
        <span id="status-connections">Connections: 0</span>
        <span class="status-sep">|</span>
        <span id="status-coords">X: 0, Y: 0</span>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="hidden">
        <div class="context-item" data-action="rename">Rename</div>
        <div class="context-item" data-action="duplicate">Duplicate</div>
        <div class="context-separator"></div>
        <div class="context-item" data-action="delete">Delete</div>
    </div>

    <!-- Hidden file inputs -->
    <input type="file" id="file-input" accept=".json" style="display:none">
    <input type="file" id="logo-input" accept="image/png,image/jpeg,image/svg+xml" style="display:none">

    <script src="devices.js"></script>
    <script src="app.js"></script>
</body>
</html>
